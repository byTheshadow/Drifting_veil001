<!-- index.html - 完整重构版 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drifting Veil - 作品展示</title>
  
  <!-- 样式文件 -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/theme-blue-dream.css">
  <link rel="stylesheet" href="styles/components.css">
  
  <!-- 配置文件 -->
  <script src="config.js"></script>
  <script src="data/profile.js"></script>
</head>
<body>
  
  <!-- 鼠标跟随光晕 -->
  <div class="cursor-glow" id="cursorGlow"></div>
  
  <!-- 开屏动画容器 -->
  <div id="splash-screen" class="splash-container">
    <iframe src="splash/splash-01/splash.html" 
            frameborder="0" 
            style="width:100vw; height:100vh; position:fixed; top:0; left:0; z-index:9999; background:#FFFFFF;">
    </iframe>
  </div>
  
  <!-- 主内容区 -->
  <div id="main-content" class="main-content">
    
    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">Drifting Veil</div>
        
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
        </button>
        
        <ul class="nav-menu" id="navMenu">
          <li><a href="#home" class="nav-link active">首页</a></li>
          <li><a href="#gallery" class="nav-link">画廊</a></li>
          <li><a href="#characters" class="nav-link">角色</a></li>
          <li><a href="#about" class="nav-link">关于</a></li>
        </ul>
      </div>
    </nav>
    
    <!-- 主页区域 -->
    <section id="home" class="hero-section">
      
      <!-- 点阵装饰 -->
      <canvas class="dot-pattern" id="dotPattern"></canvas>
      
      <div class="hero-container">
        
        <div class="hero-content">
          <!-- 左侧文字 -->
          <div class="hero-text">
            <h1 class="hero-title-zh" id="heroTitleZh">现代文艺复兴</h1>
            <h2 class="hero-title-en" id="heroTitleEn">WELCOME TO MY CREATIVE WORLD</h2>
            <p class="hero-subtitle" id="heroSubtitle">探索角色设计的无限可能</p>
          </div>
          
          <!-- 右侧装饰图片 -->
          <div class="hero-visual">
            <img src="assets/images/hero-visual.jpg" alt="Featured Work" class="hero-image" id="heroImage">
          </div>
        </div>
        
        <!-- 角色卡片网格 -->
        <div class="featured-cards" id="featuredCards">
          <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
        
      </div>
    </section>
    
    <!-- 页脚水印 -->
    <footer class="site-footer">
      <p class="watermark">Created by <span id="authorName">@玉元一shadow</span></p>
      <p class="copyright">Powered by Drifting Veil Template</p>
    </footer>
    
  </div>
  
  <!-- 主脚本 -->
  <script src="scripts/main.js"></script>
  
</body>
</html>
