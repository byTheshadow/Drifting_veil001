<!-- index.html - 修复版 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drifting Veil - 蓝色梦幻</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --primary-blue: #A5C8ED;
            --secondary-blue: #D1E3F8;
            --bg-blue: #F8FAFD;
            --text-blue: #5A7A9A;
            --text-light: #7A9AB5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background: linear-gradient(135deg, #F8FAFD 0%, #E8F4F8 100%);
            color: var(--text-blue);
            overflow-x: hidden;
        }

        /* ================= 开屏动画样式 ================= */
        .splash-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow: hidden;
        }

        .folder-icon {
            opacity: 0;
            transform: scale(0.8);
            animation: folderAppear 0.6s ease-out forwards;
        }

        @keyframes folderAppear {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .folder-icon svg {
            filter: drop-shadow(0 10px 30px rgba(165, 200, 237, 0.3));
        }

        .cursor-pointer {
            position: absolute;
            width: 24px;
            height: 24px;
            opacity: 0;
            transform: translate(-150px, -150px);
            animation: cursorMove 1.5s ease-in-out 0.8s forwards;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
        }

        @keyframes cursorMove {
            0% {
                opacity: 0;
                transform: translate(-150px, -150px);
            }
            20% {
                opacity: 1;
            }
            60% {
                opacity: 1;
                transform: translate(0, 0);
            }
            70% {
                transform: translate(0, 0) scale(0.9);
            }
            80% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(0, 0);
            }
        }

        .splash-wrapper.expand .folder-icon {
            animation: folderExpand 0.8s ease-out forwards;
        }

        @keyframes folderExpand {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.8;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .splash-wrapper.fade-out {
            animation: splashFadeOut 0.6s ease-out forwards;
        }

        @keyframes splashFadeOut {
            to {
                opacity: 0;
            }
        }

        /* ================= 主页面样式 ================= */
        .main-page {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-page.show {
            opacity: 1;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(165, 200, 237, 0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-blue);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-blue);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 主英雄区 */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景图层 */
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            filter: blur(2px);
        }

        /* 装饰背景 */
        .deco-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(165, 200, 237, 0.2);
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 5%;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            bottom: 15%;
            right: 10%;
        }

        /* 中心内容 */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 0 40px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-blue);
            margin-bottom: 20px;
            letter-spacing: 5px;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 60px;
            font-weight: 400;
        }

        /* 环绕标签系统 */
        .tags-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            z-index: 5;
            pointer-events: none;
        }

        .orbit-path {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(165, 200, 237, 0.3);
            border-radius: 50%;
            animation: rotate 80s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .tags-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .tag-item {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-blue);
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 20px rgba(165, 200, 237, 0.2);
            white-space: nowrap;
            border: 1px solid rgba(165, 200, 237, 0.3);
            pointer-events: auto;
            transform-origin: center;
        }

        .tag-item:hover {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            transform: translate(-50%, -50%) scale(1.15) !important;
            box-shadow: 0 10px 30px rgba(165, 200, 237, 0.4);
            z-index: 100;
        }

        .tag-item:hover .tag-full {
            opacity: 1;
            max-height: 100px;
            margin-top: 8px;
        }

        .tag-short {
            display: block;
            letter-spacing: 1px;
        }

        .tag-full {
            display: block;
            font-size: 0.75rem;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            margin-top: 0;
            font-weight: 400;
        }

        /* CTA 按钮 */
        .cta-button {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            box-shadow: 0 15px 35px rgba(165, 200, 237, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(165, 200, 237, 0.5);
        }

        /* 滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            opacity: 0.6;
        }

        .scroll-hint-text {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-blue);
            margin-bottom: 10px;
        }

        .scroll-arrow {
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, var(--primary-blue), transparent);
            margin: 0 auto;
            animation: scrollDown 2s ease-in-out infinite;
        }

        @keyframes scrollDown {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        /* 页脚 */
        footer {
            padding: 40px;
            text-align: center;
            color: var(--primary-blue);
            font-size: 0.9rem;
            border-top: 1px solid rgba(165, 200, 237, 0.2);
            background: rgba(255, 255, 255, 0.5);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }

            .nav-links {
                gap: 20px;
                font-size: 0.85rem;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1.5rem;
            }

            .tags-orbit {
                width: 500px;
                height: 500px;
            }

            .tag-item {
                font-size: 0.8rem;
                padding: 10px 18px;
            }
        }
    </style>
</head>
<body>
    <!-- ================= 开屏动画 ================= -->
    <div class="splash-wrapper" id="splashWrapper">
        <!-- 文件夹图标 -->
        <div class="folder-icon">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
                <path d="M20 30C20 25.5817 23.5817 22 28 22H48L56 30H92C96.4183 30 100 33.5817 100 38V90C100 94.4183 96.4183 98 92 98H28C23.5817 98 20 94.4183 20 90V30Z" 
                      fill="#A5C8ED" stroke="#A5C8ED" stroke-width="2"/>
            </svg>
        </div>
        
        <!-- 鼠标指针 -->
        <div class="cursor-pointer">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 3L10.07 19.97L12.58 12.58L19.97 10.07L3 3Z" 
                      fill="#5A7A9A" stroke="#5A7A9A" stroke-width="1.5"/>
            </svg>
        </div>
    </div>

    <!-- ================= 主页面 ================= -->
    <div class="main-page" id="mainPage">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo">DRIFTING VEIL</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="characters.html">角色</a></li>
                <li><a href="#gallery">画廊</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </nav>

        <!-- 主英雄区 -->
        <section class="hero-section">
            <!-- 背景图 -->
            <div class="hero-background">
                <img src="" alt="Background" id="heroBackgroundImg" style="display: none;">
            </div>

            <!-- 装饰圆圈 -->
            <div class="deco-background">
                <div class="deco-circle circle-1"></div>
                <div class="deco-circle circle-2"></div>
            </div>

            <!-- 环绕标签轨道 -->
            <div class="tags-orbit">
                <div class="orbit-path"></div>
                <div class="tags-container" id="tagsContainer">
                    <!-- Tags 将由 JS 生成 -->
                </div>
            </div>

            <!-- 中心内容 -->
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle">CREATIVE PORTFOLIO</h1>
                <h2 class="hero-subtitle" id="heroSubtitle">创意作品集</h2>
                <a href="characters.html" class="cta-button">探索角色</a>
            </div>

            <!-- 滚动提示 -->
            <div class="scroll-hint">
                <div class="scroll-hint-text">SCROLL TO EXPLORE</div>
                <div class="scroll-arrow"></div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>Created by @玉元一shadow | Powered by Drifting Veil Template</p>
        </footer>
    </div>

    <!-- 数据文件（在脚本之前加载） -->
    <script>
        // 默认数据（内嵌在页面中，确保一定能加载）
        window.PROFILE_DATA = {
            welcome: {
                line1: "CREATIVE PORTFOLIO",
                line2: "创意作品集"
            },
            heroBackground: "",
            tags: [
                { short: "UI/UX", full: "专注用户体验与界面美学设计" },
                { short: "插画", full: "手绘与数字插画创作" },
                { short: "角色设计", full: "原创角色概念与视觉开发" },
                { short: "动画", full: "2D/3D 动画制作与特效" },
                { short: "品牌设计", full: "视觉识别系统与品牌策略" },
                { short: "摄影", full: "商业摄影与艺术摄影" },
                { short: "平面设计", full: "海报、包装与印刷品设计" },
                { short: "网页开发", full: "前端开发与交互设计" }
            ]
        };
    </script>
    <script src="data/profile.js"></script>

    <script>
        // ================= 开屏动画逻辑 =================
        const splashWrapper = document.getElementById('splashWrapper');
        const mainPage = document.getElementById('mainPage');

        // 2.3秒后开始展开动画
        setTimeout(() => {
            splashWrapper.classList.add('expand');
        }, 2300);

        // 3.1秒后开始淡出
        setTimeout(() => {
            splashWrapper.classList.add('fade-out');
        }, 3100);

        // 3.7秒后移除开屏动画，显示主页面
        setTimeout(() => {
            splashWrapper.remove();
            mainPage.classList.add('show');
            initMainPage();
        }, 3700);

        // ================= 主页面初始化 =================
        function initMainPage() {
            console.log('初始化主页面...');
            console.log('PROFILE_DATA:', window.PROFILE_DATA);

            const profileData = window.PROFILE_DATA;
            
            // 设置标题
            document.getElementById('heroTitle').textContent = profileData.welcome.line1;
            document.getElementById('heroSubtitle').textContent = profileData.welcome.line2;
            
            // 设置背景图
            const bgImg = document.getElementById('heroBackgroundImg');
            if (profileData.heroBackground) {
                bgImg.src = profileData.heroBackground;
                bgImg.style.display = 'block';
            }

            // 生成环绕标签
            const tags = profileData.tags;
            const tagsContainer = document.getElementById('tagsContainer');
            const orbitRadius = 350; // 轨道半径

            console.log('生成标签，数量:', tags.length);

            tags.forEach((tag, index) => {
                const tagElement = document.createElement('div');
                tagElement.className = 'tag-item';
                
                // 计算位置（圆形分布）
                const angle = (index / tags.length) * Math.PI * 2 - Math.PI / 2; // 从顶部开始
                const x = Math.cos(angle) * orbitRadius;
                const y = Math.sin(angle) * orbitRadius;
                
                // 设置位置（相对于容器中心）
                tagElement.style.left = `50%`;
                tagElement.style.top = `50%`;
                tagElement.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                
                tagElement.innerHTML = `
                    <span class="tag-short">${tag.short}</span>
                    <span class="tag-full">${tag.full}</span>
                `;
                
                tagsContainer.appendChild(tagElement);
                
                console.log(`标签 ${index + 1} 已创建:`, tag.short, `位置: (${x}, ${y})`);
            });

            console.log('标签容器内容:', tagsContainer.innerHTML);

            // 鼠标视差效果
            document.addEventListener('mousemove', (e) => {
                const xNormal = (e.clientX / window.innerWidth) - 0.5;
                const yNormal = (e.clientY / window.innerHeight) - 0.5;
                
                gsap.to('.hero-title', {
                    x: xNormal * 30,
                    y: yNormal * 30,
                    duration: 1,
                    ease: "power2.out"
                });
                
                gsap.to('.hero-subtitle', {
                    x: xNormal * 20,
                    y: yNormal * 20,
                    duration: 1.2,
                    ease: "power2.out"
                });
                
                gsap.to('.tags-orbit', {
                    x: xNormal * -15,
                    y: yNormal * -15,
                    duration: 1.5,
                    ease: "power2.out"
                });
            });

            // 页面入场动画
            gsap.from('.hero-title', {
                opacity: 0,
                y: -50,
                duration: 1.2,
                ease: "power3.out",
                delay: 0.3
            });
            
            gsap.from('.hero-subtitle', {
                opacity: 0,
                y: -30,
                duration: 1.2,
                ease: "power3.out",
                delay: 0.6
            });
            
            gsap.from('.cta-button', {
                opacity: 0,
                scale: 0.8,
                duration: 0.8,
                ease: "back.out(1.7)",
                delay: 0.9
            });
            
            gsap.from('.tag-item', {
                opacity: 0,
                scale: 0,
                duration: 0.6,
                stagger: 0.1,
                ease: "back.out(1.7)",
                delay: 1.2
            });

            console.log('主页面初始化完成');
        }
    </script>
</body>
</html>
