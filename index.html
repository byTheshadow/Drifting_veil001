<!-- index.html - 重新设计的主页 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drifting Veil - 蓝色梦幻</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --primary-blue: #A5C8ED;
            --secondary-blue: #D1E3F8;
            --bg-blue: #F8FAFD;
            --text-blue: #5A7A9A;
            --text-light: #7A9AB5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background: linear-gradient(135deg, #F8FAFD 0%, #E8F4F8 100%);
            color: var(--text-blue);
            overflow-x: hidden;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(165, 200, 237, 0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-blue);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-blue);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 主英雄区 */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景图层 */
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            filter: blur(2px);
        }

        /* 装饰背景 */
        .deco-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(165, 200, 237, 0.2);
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 5%;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            bottom: 15%;
            right: 10%;
        }

        /* 中心内容 */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 0 40px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-blue);
            margin-bottom: 20px;
            letter-spacing: 5px;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 60px;
            font-weight: 400;
        }

        /* 环绕标签系统 */
        .tags-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            z-index: 5;
        }

        .orbit-path {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(165, 200, 237, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 80s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .tag-item {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-blue);
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 5px 20px rgba(165, 200, 237, 0.2);
            white-space: nowrap;
            border: 1px solid rgba(165, 200, 237, 0.3);
        }

        .tag-item:hover {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            transform: scale(1.15);
            box-shadow: 0 10px 30px rgba(165, 200, 237, 0.4);
            animation-play-state: paused;
        }

        .tag-item:hover .tag-full {
            opacity: 1;
            max-height: 100px;
            margin-top: 8px;
        }

        .tag-short {
            display: block;
            letter-spacing: 1px;
        }

        .tag-full {
            display: block;
            font-size: 0.75rem;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            margin-top: 0;
            font-weight: 400;
        }

        /* CTA 按钮 */
        .cta-button {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            box-shadow: 0 15px 35px rgba(165, 200, 237, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(165, 200, 237, 0.5);
        }

        /* 滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            opacity: 0.6;
        }

        .scroll-hint-text {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-blue);
            margin-bottom: 10px;
        }

        .scroll-arrow {
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, var(--primary-blue), transparent);
            margin: 0 auto;
            animation: scrollDown 2s ease-in-out infinite;
        }

        @keyframes scrollDown {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        /* 页脚 */
        footer {
            padding: 40px;
            text-align: center;
            color: var(--primary-blue);
            font-size: 0.9rem;
            border-top: 1px solid rgba(165, 200, 237, 0.2);
            background: rgba(255, 255, 255, 0.5);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }

            .nav-links {
                gap: 20px;
                font-size: 0.85rem;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1.5rem;
            }

            .tags-orbit {
                width: 500px;
                height: 500px;
            }

            .tag-item {
                font-size: 0.8rem;
                padding: 10px 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">DRIFTING VEIL</div>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="characters.html">角色</a></li>
            <li><a href="#gallery">画廊</a></li>
            <li><a href="#about">关于</a></li>
        </ul>
    </nav>

    <!-- 主英雄区 -->
    <section class="hero-section">
        <!-- 背景图 -->
        <div class="hero-background">
            <img src="" alt="Background" id="heroBackgroundImg">
        </div>

        <!-- 装饰圆圈 -->
        <div class="deco-background">
            <div class="deco-circle circle-1"></div>
            <div class="deco-circle circle-2"></div>
        </div>

        <!-- 环绕标签轨道 -->
        <div class="tags-orbit">
            <div class="orbit-path"></div>
            <div id="tagsContainer"></div>
        </div>

        <!-- 中心内容 -->
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">CREATIVE PORTFOLIO</h1>
            <h2 class="hero-subtitle" id="heroSubtitle">创意作品集</h2>
            <a href="characters.html" class="cta-button">探索角色</a>
        </div>

        <!-- 滚动提示 -->
        <div class="scroll-hint">
            <div class="scroll-hint-text">SCROLL TO EXPLORE</div>
            <div class="scroll-arrow"></div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>Created by @玉元一shadow | Powered by Drifting Veil Template</p>
    </footer>

    <!-- 数据文件 -->
    <script src="data/profile.js"></script>

    <script>
        // 从数据文件获取配置
        const profileData = window.PROFILE_DATA || {};
        
        // 设置标题
        document.getElementById('heroTitle').textContent = profileData.welcome?.line1 || 'CREATIVE PORTFOLIO';
        document.getElementById('heroSubtitle').textContent = profileData.welcome?.line2 || '创意作品集';
        
        // 设置背景图
        const bgImg = document.getElementById('heroBackgroundImg');
        if (profileData.heroBackground) {
            bgImg.src = profileData.heroBackground;
        }

        // 生成环绕标签
        const tags = profileData.tags || [];
        const tagsContainer = document.getElementById('tagsContainer');
        const orbitRadius = 350; // 轨道半径

        tags.forEach((tag, index) => {
            const tagElement = document.createElement('div');
            tagElement.className = 'tag-item';
            
            const angle = (index / tags.length) * Math.PI * 2;
            const x = Math.cos(angle) * orbitRadius;
            const y = Math.sin(angle) * orbitRadius;
            
            tagElement.style.left = `calc(50% + ${x}px)`;
            tagElement.style.top = `calc(50% + ${y}px)`;
            tagElement.style.transform = 'translate(-50%, -50%)';
            
            tagElement.innerHTML = `
                <span class="tag-short">${tag.short}</span>
                <span class="tag-full">${tag.full}</span>
            `;
            
            tagsContainer.appendChild(tagElement);
        });

        // 鼠标视差效果
        document.addEventListener('mousemove', (e) => {
            const xNormal = (e.clientX / window.innerWidth) - 0.5;
            const yNormal = (e.clientY / window.innerHeight) - 0.5;
            
            gsap.to('.hero-title', {
                x: xNormal * 30,
                y: yNormal * 30,
                duration: 1,
                ease: "power2.out"
            });
            
            gsap.to('.hero-subtitle', {
                x: xNormal * 20,
                y: yNormal * 20,
                duration: 1.2,
                ease: "power2.out"
            });
            
            gsap.to('.tags-orbit', {
                x: xNormal * -15,
                y: yNormal * -15,
                duration: 1.5,
                ease: "power2.out"
            });
        });

        // 页面加载动画
        window.addEventListener('load', () => {
            gsap.from('.hero-title', {
                opacity: 0,
                y: -50,
                duration: 1.2,
                ease: "power3.out",
                delay: 0.3
            });
            
            gsap.from('.hero-subtitle', {
                opacity: 0,
                y: -30,
                duration: 1.2,
                ease: "power3.out",
                delay: 0.6
            });
            
            gsap.from('.cta-button', {
                opacity: 0,
                scale: 0.8,
                duration: 0.8,
                ease: "back.out(1.7)",
                delay: 0.9
            });
            
            gsap.from('.tag-item', {
                opacity: 0,
                scale: 0,
                duration: 0.6,
                stagger: 0.1,
                ease: "back.out(1.7)",
                delay: 1.2
            });
        });
    </script>
</body>
</html>
