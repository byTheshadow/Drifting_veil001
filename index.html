<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drifting Veil - 主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #4A90E2;
            --deep-blue: #2C5F8D;
            --light-blue: #87CEEB;
            --accent-gold: #FFD700;
            --text-light: #E8F4F8;
            --bg-dark: #0A1628;
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2332 100%);
            color: var(--text-light);
            overflow-x: hidden;
            cursor: none;
        }

        /* 自定义光标 */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            mix-blend-mode: difference;
        }

        .custom-cursor.hover {
            transform: scale(1.5);
            background: rgba(74, 144, 226, 0.3);
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(10px);
            opacity: 1 !important;
            visibility: visible !important;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            opacity: 1 !important;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            opacity: 1 !important;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s;
            opacity: 1 !important;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
        }

        /* Hero 区域 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            z-index: 0;
        }

        /* 3D 行星系统 */
        .planet-system {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 3rem 0;
            z-index: 1;
            opacity: 1 !important;
            visibility: visible !important;
        }

        .planet-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--light-blue), var(--primary-blue), var(--deep-blue));
            box-shadow: 
                0 0 60px rgba(74, 144, 226, 0.6),
                inset -10px -10px 30px rgba(0, 0, 0, 0.3);
            animation: planetRotate 20s linear infinite;
            opacity: 1 !important;
            visibility: visible !important;
        }

        @keyframes planetRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 行星环 */
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 2px solid rgba(74, 144, 226, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(60deg);
            animation: orbitRotate 15s linear infinite;
            opacity: 1 !important;
            visibility: visible !important;
        }

        .orbit-ring:nth-child(2) { 
            width: 250px; 
            height: 250px; 
            animation-duration: 12s;
        }
        .orbit-ring:nth-child(3) { 
            width: 320px; 
            height: 320px; 
            animation-duration: 18s;
        }
        .orbit-ring:nth-child(4) { 
            width: 390px; 
            height: 390px; 
            animation-duration: 24s;
        }

        @keyframes orbitRotate {
            from { transform: translate(-50%, -50%) rotateX(60deg) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateX(60deg) rotateZ(360deg); }
        }

        /* 标签系统 - 关键修复 */
        .tag-item {
            position: absolute;
            padding: 0.6rem 1.2rem;
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid var(--primary-blue);
            border-radius: 20px;
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            /* 强制可见 */
            opacity: 1 !important;
            visibility: visible !important;
            display: block !important;
        }

        .tag-item:hover {
            background: rgba(74, 144, 226, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.5);
        }

        .tag-item:hover .tag-full {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .tag-full {
            position: absolute;
            top: 120%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(10, 22, 40, 0.95);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            border: 1px solid var(--primary-blue);
            z-index: 10;
        }

        /* 星星装饰 */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
            opacity: 1 !important;
            visibility: visible !important;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 欢迎文字 */
        .welcome-text {
            text-align: center;
            z-index: 1;
            opacity: 1 !important;
            visibility: visible !important;
        }

        .welcome-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--light-blue), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 1 !important;
        }

        .welcome-text p {
            font-size: 1.3rem;
            color: var(--text-light);
            opacity: 0.9;
        }

        /* CTA 按钮 */
        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            z-index: 1;
            opacity: 1 !important;
            visibility: visible !important;
        }

        .cta-btn {
            padding: 1rem 2.5rem;
            border: 2px solid var(--primary-blue);
            background: transparent;
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            border-radius: 5px;
            opacity: 1 !important;
        }

        .cta-btn:hover {
            background: var(--primary-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .planet-system {
                width: 300px;
                height: 300px;
            }
            .planet-core {
                width: 100px;
                height: 100px;
            }
            .welcome-text h1 {
                font-size: 2.5rem;
            }
            .nav-links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义光标 -->
    <div class="custom-cursor"></div>

    <!-- 导航栏 -->
    <nav>
        <div class="logo">Drifting Veil</div>
        <ul class="nav-links">
            <li><a href="index.html">主页</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="characters.html">角色</a></li>
            <li><a href="gallery.html">画廊</a></li>
        </ul>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero">
        <img class="hero-bg" id="heroBg" src="" alt="">
        
        <div class="welcome-text">
            <h1 id="welcomeLine1">加载中...</h1>
            <p id="welcomeLine2">加载中...</p>
        </div>

        <!-- 3D 行星系统 -->
        <div class="planet-system">
            <div class="planet-core"></div>
            <div class="orbit-ring"></div>
            <div class="orbit-ring"></div>
            <div class="orbit-ring"></div>
            <div id="tagsContainer"></div>
        </div>

        <div class="cta-buttons">
            <a href="about.html" class="cta-btn">了解更多</a>
            <a href="characters.html" class="cta-btn">探索角色</a>
        </div>
    </section>

    <!-- 数据文件 -->
    <script src="data/profile.js"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        // 自定义光标
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button, .tag-item').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // 加载数据
        function loadData() {
            const data = window.PROFILE_DATA || {
                welcome: { line1: "欢迎来到", line2: "Drifting Veil" },
                heroBackground: "",
                tags: [
                    { short: "创意", full: "充满创意的设计理念" },
                    { short: "技术", full: "前沿的技术实现" },
                    { short: "美学", full: "独特的视觉美学" },
                    { short: "故事", full: "引人入胜的叙事" },
                    { short: "细节", full: "精致的细节打磨" },
                    { short: "情感", full: "深刻的情感表达" },
                    { short: "探索", full: "不断探索的精神" },
                    { short: "梦想", full: "追逐梦想的勇气" }
                ]
            };

            // 设置欢迎文字
            document.getElementById('welcomeLine1').textContent = data.welcome.line1;
            document.getElementById('welcomeLine2').textContent = data.welcome.line2;

            // 设置背景图
            const heroBg = document.getElementById('heroBg');
            if (data.heroBackground) {
                heroBg.src = data.heroBackground;
                heroBg.onerror = () => {
                    heroBg.style.display = 'none';
                };
            } else {
                heroBg.style.display = 'none';
            }

            // 渲染标签
            renderTags(data.tags);
            
            // 生成星星
            generateStars();
        }

        // 渲染标签
        function renderTags(tags) {
            const container = document.getElementById('tagsContainer');
            const radius = 180;
            const angleStep = (2 * Math.PI) / tags.length;

            tags.forEach((tag, index) => {
                const angle = angleStep * index;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius * 0.3; // 扁平化

                const tagEl = document.createElement('div');
                tagEl.className = 'tag-item';
                tagEl.style.left = `calc(50% + ${x}px)`;
                tagEl.style.top = `calc(50% + ${y}px)`;
                tagEl.style.transform = 'translate(-50%, -50%)';
                
                tagEl.innerHTML = `
                    ${tag.short}
                    <div class="tag-full">${tag.full}</div>
                `;

                container.appendChild(tagEl);
            });

            console.log(`✅ 已渲染 ${tags.length} 个标签`);

            // 强制确保标签可见
            setTimeout(() => {
                document.querySelectorAll('.tag-item').forEach(tag => {
                    tag.style.opacity = '1';
                    tag.style.visibility = 'visible';
                    tag.style.display = 'block';
                });
            }, 100);
        }

        // 生成星星
        function generateStars() {
            const hero = document.querySelector('.hero');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                hero.appendChild(star);
            }
        }

        // 初始化动画 - 移除所有 opacity 动画
        function initAnimations() {
            // 导航栏动画 - 只用 y 轴移动
            gsap.from('nav', {
                y: -100,
                duration: 1,
                ease: "power3.out"
            });

            // 欢迎文字动画 - 只用 scale
            gsap.from('.welcome-text h1', {
                scale: 0.5,
                duration: 1,
                ease: "back.out(1.7)",
                delay: 0.3
            });

            gsap.from('.welcome-text p', {
                y: 30,
                duration: 0.8,
                ease: "power2.out",
                delay: 0.6
            });

            // 行星系统动画 - 只用 scale
            gsap.from('.planet-core', {
                scale: 0,
                duration: 1.2,
                ease: "elastic.out(1, 0.5)",
                delay: 0.8
            });

            gsap.from('.orbit-ring', {
                scale: 0,
                duration: 1,
                stagger: 0.15,
                ease: "power2.out",
                delay: 1
            });

            // 标签动画 - 只用 scale，完全不用 opacity
            gsap.from('.tag-item', {
                scale: 0,
                duration: 0.6,
                stagger: 0.08,
                ease: "back.out(1.7)",
                delay: 1.2,
                onComplete: () => {
                    // 动画完成后再次确保可见
                    document.querySelectorAll('.tag-item').forEach(tag => {
                        tag.style.opacity = '1';
                        tag.style.visibility = 'visible';
                    });
                }
            });

            // 按钮动画
            gsap.from('.cta-btn', {
                y: 50,
                duration: 0.8,
                stagger: 0.2,
                ease: "power2.out",
                delay: 1.5
            });

            // 星星动画
            gsap.from('.star', {
                scale: 0,
                duration: 1,
                stagger: 0.02,
                ease: "power1.out",
                delay: 0.5
            });
        }

        // 页面加载
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            initAnimations();
        });
    </script>
</body>
</html>
