<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drifting Veil - 作品展示</title>
  
  <!-- 优雅字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- 样式文件 -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/theme-blue-dream.css">
  <link rel="stylesheet" href="styles/components.css">
  
  <!-- 配置文件 -->
  <script src="config.js"></script>
  <script src="data/profile.js"></script>
</head>
<body>
  
  <!-- 开屏动画容器 -->
  <div id="splash-screen" class="splash-container">
    <iframe src="splash/splash-01/splash.html" 
            frameborder="0" 
            style="width:100vw; height:100vh; position:fixed; top:0; left:0; z-index:9999; background:#FFFFFF;">
    </iframe>
  </div>
  
  <!-- 主内容区 -->
  <div id="main-content" class="main-content">
    
    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">Drifting Veil</div>
        
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
        </button>
        
        <ul class="nav-menu" id="navMenu">
          <li><a href="#home" class="nav-link active">首页</a></li>
          <li><a href="#gallery" class="nav-link">画廊</a></li>
          <li><a href="#characters" class="nav-link">角色</a></li>
          <li><a href="#about" class="nav-link">关于</a></li>
        </ul>
      </div>
    </nav>
    
    <!-- 装饰背景线条 -->
    <svg class="bg-lines" viewBox="0 0 1000 1000">
      <circle cx="500" cy="500" r="300" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="500" cy="500" r="400" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
      <path d="M0,500 Q500,0 1000,500" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
      <path d="M0,500 Q500,1000 1000,500" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
    </svg>
    
    <!-- 主页英雄区 -->
    <section id="home" class="hero-section">
      <div class="hero-container">
        
        <!-- 标题 -->
        <div class="main-title" id="mainTitle">
          <h1 class="hero-title-en" id="heroTitleEn">CREATIVE PORTFOLIO</h1>
          <p class="hero-title-zh" id="heroTitleZh">创意作品集</p>
        </div>
        
        <!-- 轨道标签系统 -->
        <div class="tag-orbit" id="tagOrbit">
          <!-- 标签将通过 JavaScript 动态生成 -->
        </div>
        
        <!-- 中心圆形图片 -->
        <div class="center-frame" id="centerFrame">
          <img src="assets/images/hero-visual.jpg" alt="Featured Work" id="heroImage">
        </div>
        
        <!-- 滚动提示 -->
        <div class="scroll-hint">
          <span>SCROLL TO EXPLORE</span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 5V15M10 15L5 10M10 15L15 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        
      </div>
    </section>
    
    <!-- 角色卡片展示区 -->
    <section id="characters" class="cards-section">
      <div class="cards-container">
        <h2 class="section-title">角色作品</h2>
        <div class="featured-cards" id="featuredCards">
          <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
      </div>
    </section>
    
    <!-- 页脚水印 -->
    <footer class="site-footer">
      <p class="watermark">Created by <span id="authorName">@玉元一shadow</span></p>
      <p class="copyright">Powered by Drifting Veil Template</p>
    </footer>
    
  </div>
  
  <!-- GSAP 动画库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <!-- 主脚本 -->
  <script src="scripts/main.js"></script>
  
</body>
</html>
