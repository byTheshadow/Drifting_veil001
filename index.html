<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drifting Veil - 作品展示</title>
  
  <!-- 样式文件 -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/theme-blue-dream.css">
  <link rel="stylesheet" href="styles/components.css">
  
  <!-- 配置文件 -->
  <script src="config.js"></script>
  <script src="data/profile.js"></script>
</head>
<body>
  
  <!-- 开屏动画容器（后续实现） -->
  <div id="splash-screen" class="splash-container">
    <!-- 开屏动画将在这里加载 -->
  </div>
  
  <!-- 主内容区 -->
  <div id="main-content" class="main-content">
    
    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">
          <span class="logo-text">Drifting Veil</span>
        </div>
        
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>
        
        <ul class="nav-menu" id="navMenu">
          <li><a href="#home" class="nav-link active">首页</a></li>
          <li><a href="#gallery" class="nav-link">画廊</a></li>
          <li><a href="#characters" class="nav-link">角色</a></li>
          <li><a href="#about" class="nav-link">关于</a></li>
        </ul>
      </div>
    </nav>
    
    <!-- 主页区域 -->
    <section id="home" class="hero-section">
      <div class="hero-container">
        
        <!-- 欢迎语 -->
        <div class="hero-text">
          <h1 class="hero-title-zh" id="heroTitleZh">某某某的作品网站</h1>
          <h2 class="hero-title-en" id="heroTitleEn">WELCOME</h2>
          <p class="hero-subtitle" id="heroSubtitle">探索我的创作世界</p>
        </div>
        
        <!-- 角色卡片网格 -->
        <div class="featured-cards" id="featuredCards">
          <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
        
      </div>
    </section>
    
    <!-- 页脚水印 -->
    <footer class="site-footer">
      <p class="watermark">Created by <span id="authorName">@玉元一shadow</span></p>
      <p class="copyright">Powered by Drifting Veil Template</p>
    </footer>
    
  </div>
  
  <!-- 主脚本 -->
  <script src="scripts/main.js"></script>
  
</body>
</html>
