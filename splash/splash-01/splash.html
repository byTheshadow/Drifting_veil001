<!-- splash/splash-01/splash.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <link rel="stylesheet" href="splash.css">
</head>
<body>
  <div class="splash-wrapper">
    
    <!-- 背景层 -->
    <div class="splash-bg"></div>
    
    <!-- 文件夹动画区 -->
    <div class="folders-container">
      <!-- 移动的文件夹 -->
      <div class="folder folder-1">
        <div class="folder-icon">📁</div>
        <div class="folder-label">Projects</div>
      </div>
      <div class="folder folder-2">
        <div class="folder-icon">📁</div>
        <div class="folder-label">Gallery</div>
      </div>
      <div class="folder folder-3 folder-main">
        <div class="folder-icon">📂</div>
        <div class="folder-label">Characters</div>
      </div>
      <div class="folder folder-4">
        <div class="folder-icon">📁</div>
        <div class="folder-label">About</div>
      </div>
    </div>
    
    <!-- 鼠标指针 -->
    <div class="cursor-pointer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M3 3L10.07 19.97L12.58 12.58L19.97 10.07L3 3Z" 
              fill="currentColor" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>
    
    <!-- 展开的内容 -->
    <div class="folder-expand">
      <div class="expand-content">
        <div class="expand-title">Welcome</div>
        <div class="expand-subtitle">进入作品世界</div>
      </div>
    </div>
    
    <!-- 加载进度 -->
    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
    
  </div>
  
  <script src="splash.js"></script>
</body>
</html>
